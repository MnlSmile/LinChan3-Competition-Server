syntax = "proto3";

message Envelope {
    int32 type = 1;
    string uuid = 2;
    bytes data = 3;
}

message PushNewestAuthorizationCodeQuery {
    string task_uuid = 1;
    string code = 2;
    string original_message = 3;
    int64 time = 4;
}

message PushNewestAuthorizationCodeResponse {
    string task_uuid = 1;
}