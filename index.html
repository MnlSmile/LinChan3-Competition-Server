<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="简约现代首页问候">
    <title>你好 · 简约空间</title>
    <style>
        /* 极简重置 + 现代美学系统 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 洁净柔白背景，凸显纯粹内容 */
            background-color: #66CCFF;
            /* 提升现代感的无衬线字体栈，干净优雅 */
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Noto Sans', sans-serif;
            color: #1A1A1A;
            line-height: 1.2;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* 细微滚动平滑，无感 */
            scroll-behavior: smooth;
        }

        /* 主要内容区 — 完全聚焦于「你好」 */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* 问候容器，纯粹至极 */
        .greeting-container {
            text-align: center;
        }

        /* 主视觉文字：「你好」，凸显现代感与呼吸感 */
        .greeting {
            font-size: clamp(3.2rem, 14vw, 8rem);
            font-weight: 480;
            letter-spacing: -0.02em;
            margin: 0;
            color: #131313;
            /* 微妙过渡提升细腻体验，同时保持克制 */
            transition: color 0.25s ease-out;
            cursor: default;
            /* 轻微字距优化，大尺寸更通透 */
            line-height: 1.1;
        }

        /* 底部页脚：只保留备案号，极致克制 */
        .site-footer {
            text-align: center;
            padding: 1.4rem 1.2rem 1.8rem;
            background: transparent;
            /* 极细分割线，几乎隐形但保留层级雅致 */
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* 备案号样式 — 轻盈，便携，合规悬挂 */
        .icp-record {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.2px;
            color: #9B9B9F;
            transition: all 0.2s ease;
        }

        .icp-record a {
            color: currentColor;
            text-decoration: none;
            border-bottom: 0.5px solid rgba(155, 155, 159, 0.4);
            transition: color 0.2s, border-color 0.2s;
        }

        /* 悬浮时更现代的深色信号，不失正式感 */
        .icp-record a:hover {
            color: #1F3B4C;
            border-bottom-color: #1F3B4C;
        }

        /* 移动端细微优化 — 保持留白舒服 */
        @media (max-width: 560px) {
            .main-content {
                padding: 1.5rem;
            }
            .site-footer {
                padding: 1rem 1rem 1.4rem;
            }
            .icp-record {
                font-size: 0.75rem;
            }
        }

        /* 可选：大屏幕也保持呼吸感 */
        @media (min-width: 1600px) {
            .greeting {
                font-weight: 470;
                letter-spacing: -0.01em;
            }
        }

        /* 极简纯色背景，绝不冗余，完全吻合「一个你好」的主视觉 */
    </style>
</head>
<body>

    <!-- 只有「你好」作为绝对核心内容 -->
    <main class="main-content">
        <div class="greeting-container">
            <div class="greeting">你好</div>
        </div>
    </main>

    <!-- 底部悬挂备案信息 — 仅显示桂ICP备号，完全契合合规与极简双重需求 -->
    <footer class="site-footer">
        <div class="icp-record">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer">
                桂ICP备2026008607号-1
            </a>
        </div>
    </footer>

</body>
</html>
